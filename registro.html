<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENFOCADOS - Alta de Alumno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --Y: rgb(250,250,0); --D: #2c3e50; --B: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: #fdfdf2; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 2px solid var(--Y); }
        h1 { text-align: center; color: var(--D); margin-bottom: 1.5rem; font-weight: 800; }
        .field { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 700; font-size: 0.9rem; }
        input, select { width: 100%; padding: 0.9rem; border: 2px solid var(--B); border-radius: 12px; font-size: 1rem; box-sizing: border-box; }
        .price-box { background: #f1f5f9; padding: 1.2rem; border-radius: 12px; text-align: center; margin: 1.5rem 0; font-weight: 800; font-size: 1.5rem; border: 2px dashed var(--D); }
        .btn { width: 100%; padding: 1.1rem; background: var(--Y); color: var(--D); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn:hover { background: #eaea00; transform: translateY(-2px); }
        .hidden { display: none; }
        .info-pago { font-size: 0.8rem; color: #64748b; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div id="form-box">
        <h1>Alta Alumno</h1>
        <div class="field">
            <label>Email de acceso</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com">
        </div>
        <div class="field">
            <label>Nombre Completo</label>
            <input type="text" id="nombre" placeholder="Tu nombre y apellidos">
        </div>
        <div class="field">
            <label>Plan elegido</label>
            <select id="plan" onchange="actualizar()">
                <option value="semanal" data-p="7">Suscripción Semanal - 7€</option>
                <option value="mensual" data-p="12">Suscripción Mensual - 12€</option>
            </select>
        </div>
        <div class="field">
            <label>¿Tienes un Código VIP?</label>
            <input type="text" id="promo" placeholder="Introduce el código aquí" oninput="actualizar()">
        </div>
        <div class="price-box" id="p-txt">7.00€</div>
        <button class="btn" id="btn-envio" onclick="registrar()">Continuar</button>
