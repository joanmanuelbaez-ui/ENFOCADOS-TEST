<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENFOCADOS - Registro y Validación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --Y: rgb(250,250,0); --D: #2c3e50; --B: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: #fdfdf2; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 2px solid var(--Y); }
        h1 { text-align: center; color: var(--D); margin-bottom: 1.5rem; font-weight: 800; }
        .field { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 700; font-size: 0.9rem; }
        input { width: 100%; padding: 0.9rem; border: 2px solid var(--B); border-radius: 12px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 1.1rem; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1rem; margin-top: 10px; }
        .btn-vip { background: var(--Y); color: var(--D); }
        .btn-stripe { background: var(--D); color: white; margin-top: 20px; }
        .divider { margin: 25px 0; text-align: center; border-bottom: 1px solid var(--B); line-height: 0.1em; }
        .divider span { background:#fff; padding:0 10px; color: #64748b; font-size: 0.8rem; }
        .loading { display: none; text-align: center; margin-top: 10px; color: var(--D); font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <div id="form-box">
        <h1>Acceso Alumnos</h1>
        
        <div class="field">
            <label>Nombre Completo</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
        </div>
        <div class="field">
            <label>Email (Usuario)</label>
            <input type="email" id="email" placeholder="tu@email.com">
        </div>

        <div style="background: #fffde7; padding: 15px; border-radius: 15px; border: 1px solid #ffe082;">
            <label>¿Tienes un Código VIP?</label>
            <input type="text" id="promo" placeholder="Introduce tu código">
            <button class="btn btn-vip" id="btn-vip" onclick="validarYRegistrar()">Validar y Acceder al Test</button>
            <div id="msg-loading" class="loading">Validando código y registrando...</div>
        </div>

        <div class="divider"><span>O SI NO TIENES CÓDIGO</span></div>

        <button class="btn btn-stripe" onclick="redirigirStripe()">Pagar Suscripción en Stripe</button>
    </div>
</div>
