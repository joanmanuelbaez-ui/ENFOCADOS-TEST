<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENFOCADOS - Registro de Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --Y: rgb(250,250,0); --D: #2c3e50; --B: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: #fdfdf2; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 420px; border: 3px solid var(--Y); }
        h1 { text-align: center; color: var(--D); margin-bottom: 2rem; font-weight: 800; font-size: 1.8rem; }
        .field { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 700; color: var(--D); font-size: 0.95rem; }
        input, select { width: 100%; padding: 1rem; border: 2px solid var(--B); border-radius: 12px; font-size: 1rem; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--D); outline: none; }
        
        /* Estilo especial para resaltar el código promocional */
        .promo-field { background: #fffde7; padding: 1rem; border-radius: 12px; border: 1px solid #ffe082; margin-bottom: 1.5rem; }
        
        .price-box { background: #f8fafc; padding: 1.2rem; border-radius: 12px; text-align: center; margin: 1.5rem 0; font-weight: 800; font-size: 1.6rem; border: 2px dashed var(--D); color: var(--D); }
        
        .btn { width: 100%; padding: 1.2rem; background: var(--Y); color: var(--D); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1.1rem; text-transform: uppercase; }
        .btn:hover { background: #eaea00; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .hidden { display: none; }
        .info-text { font-size: 0.85rem; color: #64748b; text-align: center; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <div id="form-box">
        <h1>Registro de Usuario</h1>
        
        <div class="field">
            <label>Nombre Completo</label>
            <input type="text" id="nombre" placeholder="Escribe tu nombre y apellidos">
        </div>

        <div class="field">
            <label>Email de Usuario</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com">
        </div>

        <div class="promo-field">
            <label style="color: #856404;">¿Tienes un Código de Acceso?</label>
            <input type="text" id="promo" placeholder="Introduce tu código VIP aquí" oninput="actualizarFlujo()">
        </div>

        <div id="payment-options">
            <div class="field">
                <label>Selecciona tu Plan de Pago</label>
                <select id="plan" onchange="actualizarFlujo()">
                    <option value="semanal" data-p="7">Plan Semanal - 7€</option>
                    <option value="mensual" data-p="12">Plan Mensual - 12€</option>
                </select>
            </div>
        </div>

        <div class="price-box" id="p-txt">7.00€</div>
        
        <button class="btn" id="btn-main" onclick="procesarAcceso()">Ir al Pago en Stripe</button>
        
        <p class="info-text" id="info-footer">
            Si no tienes código, pulsa el botón para activar tu suscripción mediante Stripe.
        </p>
    </div>

    <div id="success-box" class="hidden" style="text-align: center;">
        <div style="font-size: 5rem; margin-bottom: 1rem;">🎉</div>
        <h2 style="color: #0f172a; font-weight: 800;">¡Acceso Concedido!</h2>
        <p style="color: #475569; margin-bottom: 2rem;">Tu código ha sido validado. Tu correo ya está dado de alta en el sistema.</p>
        <button class="btn" onclick="window.location.href='https://joanmanuelbaez-ui.github.io/ENFOCADOS-TEST/index.html'">Acceder a la Plataforma</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzNS7LwGXvAEqf1BMD91feWB2dAm17ktnc2VxGh8HnKhiXHACLeLc6RycHHmp1tyzZ5A/exec";

    function actualizarFlujo() {
        const promo = document.getElementById('promo').value.trim().toUpperCase();
        const planSelect = document.getElementById('plan');
        const priceTxt = document.getElementById('p-txt');
        const btn = document.getElementById('btn-main');
        const info = document.getElementById('info-footer');
        const paymentArea = document.getElementById('payment-options');

        let precioBase = planSelect.options[planSelect.selectedIndex].getAttribute('data-p');

        if (promo === "VIP123" || promo === "GRATIS2024") {
            priceTxt.textContent = "0.00€ (VIP)";
            btn.textContent = "Dar de Alta y Acceder";
            info.textContent = "Código VIP detectado. Se te dará acceso inmediato.";
            paymentArea.style.opacity = "0.5"; // Difuminamos los planes de pago
        } else {
            priceTxt.textContent = precioBase + ".00€";
            btn.textContent = "Ir al Pago en Stripe";
            info.textContent = "Si no tienes código, activa tu cuenta mediante el pago seguro.";
            paymentArea.style.opacity = "1";
        }
    }

    async function procesarAcceso() {
        const nombre = document.getElementById('nombre').value.trim();
        const email = document.getElementById('email').value.trim();
        const promo = document.getElementById('promo').value.trim().toUpperCase();
        const plan = document.getElementById('plan').value;
        const esVip = (promo === "VIP123" || promo === "GRATIS2024");

        if (!nombre || !email || !email.includes('@')) {
            alert("Por favor, completa tu nombre y un correo válido.");
            return;
        }

        const btn = document.getElementById('btn-main');
        btn.disabled = true;
        btn.textContent = "Procesando...";

        if (esVip) {
            // FLUJO 1: REGISTRO VIP DIRECTO EN GOOGLE SHEETS
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        nombre: nombre,
                        email: email,
                        plan: "ACCESO_VIP",
                        precio: 0,
                        estado: "ACTIVO_PROMO"
                    })
                });
                // Cambiar a pantalla de éxito
                document.getElementById('form-box').classList.add('hidden');
                document.getElementById('success-box').classList.remove('hidden');
            } catch (e) {
                alert("Error al conectar con el servidor de registro.");
                btn.disabled = false;
                btn.textContent = "Dar de Alta y Acceder";
            }
        } else {
            // FLUJO 2: REDIRECCIÓN A STRIPE (Sin registrar en Sheets para no ensuciar)
            alert("Redirigiendo a la pasarela de pago segura de Stripe...");
            // REEMPLAZA ESTE LINK POR TU LINK DE STRIPE
            window.location.href = "https://buy.stripe.com/test_EJEMPLO"; 
        }
    }
</script>
</body>
</html>
