<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENFOCADOS · Registro y Alta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --Y: rgb(250,250,0);
  --D: #2c3e50;
  --V: #10b981;
  --R: #ef4444;
  --B: #e2e8f0;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(160deg, #fffef0 0%, #fff9c4 60%, #f0f9ff 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.reg-card {
  background: white;
  max-width: 500px;
  width: 100%;
  padding: 2.5rem;
  border-radius: 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  border: 2px solid var(--Y);
}
h1 { font-family: 'Space Grotesk', sans-serif; text-align: center; margin-bottom: 2rem; color: var(--D); }
.step { display: none; }
.step.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.field { margin-bottom: 1.2rem; }
label { display: block; margin-bottom: 0.5rem; font-weight: 700; font-size: 0.9rem; }
input { width: 100%; padding: 1rem; border: 2px solid var(--B); border-radius: 12px; font-size: 1rem; }
input:focus { border-color: var(--Y); outline: none; }
.btn { width: 100%; padding: 1rem; background: var(--Y); color: var(--D); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 1.1rem; margin-top: 1rem; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.price-tag { background: #f8fafc; padding: 1rem; border-radius: 12px; text-align: center; margin: 1rem 0; border: 1px dashed var(--D); }
</style>
</head>
<body>

<div class="reg-card">
  <h1>Registro Alumno</h1>
  
  <div id="step-1" class="step active">
    <div class="field">
      <label>Introduce tu Email para comenzar</label>
      <input type="email" id="reg-email" placeholder="ejemplo@correo.com">
    </div>
    <button class="btn" onclick="checkEmail()">Siguiente</button>
  </div>

  <div id="step-2" class="step">
    <div class="field">
      <label>Nombre Completo</label>
      <input type="text" id="reg-name" placeholder="Tu nombre">
    </div>
    <div class="field">
      <label>¿Tienes un código promocional?</label>
      <input type="text" id="reg-promo" placeholder="CÓDIGO (Opcional)">
    </div>
    <div class="price-tag">
      <span style="font-size:0.9rem; color:var(--G)">Total a pagar:</span><br>
      <strong id="final-price" style="font-size:1.5rem">29.90€</strong>
    </div>
    <button class="btn" onclick="goToPayment()">Confirmar y Pagar</button>
  </div>

  <div id="step-3" class="step">
    <div style="text-align:center">
      <div style="font-size:4rem; margin-bottom:1rem">✅</div>
      <h2>¡Registro Completado!</h2>
      <p style="margin:1rem 0; color:var(--G)">Se ha enviado el alta a la base de datos de Usuarios Activos.</p>
      <button class="btn" onclick="window.location.href='index.html'">Ir al Panel de Test</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbx9MkwwgFndE2uMvhzHM4zDUzfbGmqwuzc10wKqapfy2nIiOQwjLCdwDsX_Hubru-8S/exec';

function checkEmail() {
  const email = document.getElementById('reg-email').value;
  if(!email.includes('@')) return alert("Email no válido");
  
  document.getElementById('step-1').classList.remove('active');
  document.getElementById('step-2').classList.add('active');
}

function goToPayment() {
  const email = document.getElementById('reg-email').value;
  const nombre = document.getElementById('reg-name').value;
  
  if(!nombre) return alert("Indica tu nombre");

  const btn = document.querySelector('#step-2 .btn');
  btn.disabled = true;
  btn.textContent = "Procesando...";

  // Simulamos el alta en USUARIOS_ACTIVOS y el pago
  setTimeout(() => {
    document.getElementById('step-2').classList.remove('active');
    document.getElementById('step-3').classList.add('active');
  }, 1500);
}
</script>
</body>
</html>
