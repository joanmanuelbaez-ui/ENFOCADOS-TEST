<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENFOCADOS - Registro de Nuevo Alumno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --Y: rgb(250,250,0);
            --D: #2c3e50;
            --B: #e2e8f0;
            --G: #64748b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdfdf2 0%, #fffde7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            border: 2px solid var(--Y);
        }
        h1 { text-align: center; color: var(--D); font-weight: 800; margin-bottom: 1.5rem; font-size: 1.8rem; }
        .field { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 700; color: var(--D); font-size: 0.9rem; }
        input, select { 
            width: 100%; 
            padding: 1rem; 
            border: 2px solid var(--B); 
            border-radius: 12px; 
            font-size: 1rem; 
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--Y); outline: none; }
        .price-tag { 
            background: #f1f5f9; 
            padding: 1.2rem; 
            border-radius: 12px; 
            text-align: center; 
            margin: 1.5rem 0; 
            border: 2px dashed var(--D);
        }
        #final-price { font-size: 1.8rem; font-weight: 800; color: var(--D); }
        .btn { 
            width: 100%; 
            padding: 1.1rem; 
            background: var(--Y); 
            color: var(--D); 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1.1rem; 
            transition: all 0.3s;
        }
        .btn:hover { background: #eaea00; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .hidden { display: none; }
        .success-icon { font-size: 4rem; margin-bottom: 1rem; color: #10b981; }
    </style>
</head>
<body>

<div class="card">
    <div id="form-container">
        <h1>Alta de Alumno</h1>
        
        <div class="field">
            <label>Tu Email (será tu usuario)</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com">
        </div>

        <div class="field">
            <label>Nombre Completo</label>
            <input type="text" id="nombre" placeholder="Nombre y Apellidos">
        </div>

        <div class="field">
            <label>Plan de Acceso</label>
            <select id="plan" onchange="calcularPrecio()">
                <option value="semanal" data-p="7">Suscripción Semanal - 7,00€</option>
                <option value="mensual" data-p="12">Suscripción Mensual - 12,00€</option>
                <option value="anual" data-p="177">Suscripción Anual - 177,00€</option>
            </select>
        </div>

        <div class="field">
            <label>Código Promocional</label>
            <input type="text" id="promo" placeholder="Introduce tu código" oninput="calcularPrecio()">
        </div>

        <div class="price-tag">
            <span style="color: var(--G); font-size: 0.9rem;">Total a pagar:</span><br>
            <span id="final-price">7.00€</span>
        </div>

        <button class="btn" id="btn-submit" onclick="ejecutarRegistro()">Confirmar y Pagar</button>
    </div>

    <div id="success-container" class="hidden" style="text-align: center;">
        <div class="success-icon">✅</div>
        <h2>¡Registro con Éxito!</h2>
        <p style="color: var(--G); margin-bottom: 2rem;">Tus datos han sido guardados correctamente en la base de datos.</p>
        <button class="btn" onclick="window.location.href='https://joanmanuelbaez-ui.github.io/ENFOCADOS-TEST/index.html'">Acceder al Test</button>
    </div>
</div>

<script>
    // URL DE EJECUCIÓN DEL SCRIPT (NO LA DE LIBRARY)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzNS7LwGXvAEqf1BMD91feWB2dAm17ktnc2VxGh8HnKhiXHACLeLc6RycHHmp1tyzZ5A/exec";

    const STRIPE_LINKS = {
        "semanal": "https://buy.stripe.com/test_semanal_tu_link",
        "mensual": "https://buy.stripe.com/test_mensual_tu_link",
        "anual": "https://buy.stripe.com/test_anual_tu_link"
    };

    function calcularPrecio() {
        const selectPlan = document.getElementById('plan');
        const promo = document.getElementById('promo').value.trim().toUpperCase();
        let precioBase = selectPlan.options[selectPlan.selectedIndex].getAttribute('data-p');
        
        const priceDisplay = document.getElementById('final-price');
        const btnSubmit = document.getElementById('btn-submit');

        // Soporte para múltiples códigos promocionales
        if (promo === "GRATIS2024" || promo === "VIP123") {
            priceDisplay.textContent = "0.00€ (PROMO)";
            btnSubmit.textContent = "Activar Acceso Gratis";
        } else {
            priceDisplay.textContent = precioBase + ".00€";
            btnSubmit.textContent = "Confirmar y Pagar";
        }
    }

    async function ejecutarRegistro() {
        const email = document.getElementById('email').value.trim();
        const nombre = document.getElementById('nombre').value.trim();
        const plan = document.getElementById('plan').value;
        const precioTxt = document.getElementById('final-price').textContent;
        const esGratis = precioTxt.includes("0.00");

        if (!email || !nombre || !email.includes('@')) {
            return alert("Por favor, introduce un nombre y un email válido.");
        }

        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.textContent = "Guardando datos...";

        try {
            // Envío al Apps Script con modo no-cors para evitar el error Access Denied
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    nombre: nombre,
                    plan: plan,
                    precio: esGratis ? 0 : parseFloat(precioTxt)
                })
            });

            // Tras el envío (sin esperar respuesta por no-cors) realizamos la acción
            if (esGratis) {
                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-container').classList.remove('hidden');
            } else {
                window.location.href = STRIPE_LINKS[plan];
            }

        } catch (error) {
            console.error("Error:", error);
            alert("Error de conexión. Revisa tu internet.");
            btn.disabled = false;
            btn.textContent = "Confirmar y Pagar";
        }
    }
</script>
</body>
</html>
