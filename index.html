<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENFOCADOS TEST - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#f8f9fa;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .card{background:#fff;padding:2rem;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);width:100%;max-width:400px;text-align:center;border:2px solid #FAFA00}
        h1{font-family:'Montserrat',sans-serif;margin-bottom:1.5rem;color:#2c3e50}
        input{width:100%;padding:12px;margin-bottom:1rem;border:1px solid #ddd;border-radius:8px;font-size:1rem}
        button{width:100%;padding:12px;background:#FAFA00;border:none;border-radius:8px;font-weight:700;cursor:pointer;transition:0.3s;font-size:1rem;color:#000}
        button:hover{background:#e6e600}
        button:disabled{background:#ccc;cursor:not-allowed}
    </style>
</head>
<body>

<div class="card">
    <h1>ENFOCADOS</h1>
    <p style="margin-bottom:1.5rem;color:#666;font-weight:600">ENTORNO DE PRUEBAS</p>
    <div style="text-align:left;margin-bottom:0.5rem">
        <label style="font-size:0.8rem;font-weight:600;color:#333">Email del alumno (Columna B)</label>
    </div>
    <input type="email" id="emailInput" placeholder="ejemplo@correo.com">
    <button id="btnEntrar" onclick="validar()">Entrar al Test</button>
</div>

<script>
// URL VERIFICADA DEL PASO 1
const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbx9MkwwgFndE2uMvhzHM4zDUzfbGmqwuzc10wKqapfy2nIiOQwjLCdwDsX_Hubru-8S/exec';

function validar() {
    const email = document.getElementById('emailInput').value.trim().toLowerCase();
    const btn = document.getElementById('btnEntrar');
    
    if(!email) {
        alert("Por favor, introduce tu email.");
        return;
    }

    btn.disabled = true;
    btn.textContent = "Verificando en base de datos...";

    // Nombre único para el callback de esta petición
    const callbackName = 'jsonp_' + Date.now();
    
    const script = document.createElement('script');
    
    window[callbackName] = (res) => {
        // Limpieza: eliminamos el script y la función global
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
        
        btn.disabled = false;
        btn.textContent = "Entrar al Test";

        if(res.error) {
            alert("Error del servidor: " + res.message);
        } else {
            // Buscamos el email en la fila, posición 1 (Columna B)
            const user = res.users.rows.find(row => String(row[1]).toLowerCase().trim() === email);

            if(user) {
                alert("✅ ACCESO CORRECTO.\n\nHola " + (user[0] || "Alumno") + ", hemos cargado " + res.questions.rows.length + " preguntas con éxito.");
                console.log("PREGUNTAS CARGADAS:", res.questions.rows);
            } else {
                alert("❌ ACCESO DENEGADO.\n\nEl email '" + email + "' no está en la Columna B de la hoja USUARIOS.");
            }
        }
    };

    // Configuramos y lanzamos la petición JSONP
    script.src = URL_SCRIPT + '?type=all&callback=' + callbackName;
    document.body.appendChild(script);
}
</script>
</body>
</html>
