<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENFOCADOS TEST - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--Y:rgb(250,250,0);--D:#2c3e50;--B:#e2e8f0;--G:#64748b}
        body{font-family:'Inter',sans-serif;background:linear-gradient(160deg,#fffef0 0%,#fff9c4 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .card{background:#fff;border-radius:18px;padding:2.5rem;box-shadow:0 10px 30px rgba(0,0,0,0.1);border:2px solid var(--Y);width:100%;max-width:450px;text-align:center}
        h1{font-family:'Montserrat',sans-serif;font-size:2.2rem;margin-bottom:0.5rem;color:var(--D)}
        .sub{color:var(--G);font-size:0.9rem;text-transform:uppercase;margin-bottom:2rem;letter-spacing:1px}
        .field{margin-bottom:1.5rem;text-align:left}
        .field label{display:block;margin-bottom:0.5rem;font-weight:600;font-size:0.9rem}
        .field input{width:100%;padding:1rem;border:2px solid var(--B);border-radius:12px;font-size:1rem}
        .btn{padding:1rem;background:var(--Y);color:var(--D);border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;width:100%;transition:0.3s}
        .btn:hover{background:#e6e600}
    </style>
</head>
<body>
<div class="card">
    <h1>ENFOCADOS</h1>
    <div class="sub">Entorno de Test</div>
    <div class="field">
        <label>Introduce tu Email</label>
        <input type="email" id="inEmail" placeholder="tu@email.com">
    </div>
    <button id="btnLogin" class="btn" onclick="doLogin()">Entrar al Test</button>
</div>

<script>
const apiUrl = 'https://script.google.com/macros/s/AKfycbx9MkwwgFndE2uMvhzHM4zDUzfbGmqwuzc10wKqapfy2nIiOQwjLCdwDsX_Hubru-8S/exec';

function doLogin() {
    const email = document.getElementById('inEmail').value.trim().toLowerCase();
    const btn = document.getElementById('btnLogin');
    if(!email) { alert("Por favor, introduce tu email."); return; }

    btn.textContent = "Verificando...";
    btn.disabled = true;

    const callbackName = 'jsonp_' + Date.now();
    window[callbackName] = (res) => {
        delete window[callbackName];
        
        if(res.error) {
            alert("Error: " + res.message);
        } else {
            // Buscamos en row[1] porque el correo está en la Columna B
            const users = res.users.rows.map(row => ({ correo: String(row[1]).toLowerCase().trim() }));
            const user = users.find(u => u.correo === email);

            if(user) {
                alert("✅ ACCESO CORRECTO. Se han cargado las preguntas de la base de datos.");
                console.log("Datos de preguntas listos:", res.questions.rows);
            } else {
                alert("❌ El email '" + email + "' no está registrado en la hoja de TEST.");
            }
        }
        btn.textContent = "Entrar al Test";
        btn.disabled = false;
    };

    const script = document.createElement('script');
    script.src = apiUrl + '?type=all&callback=' + callbackName;
    document.body.appendChild(script);
}
</script>
</body>
</html>
