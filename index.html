<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENFOCADOS · Plataforma de Preparación (TEST)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* --- TUS ESTILOS ORIGINALES DE PRODUCCIÓN (SIN CAMBIOS) --- */
:root {
  --Y: rgb(250,250,0); --Yd: rgb(215,215,0); --D: #2c3e50; --D2: #1a252f;
  --V: #10b981; --R: #ef4444; --G: #64748b; --B: #e2e8f0; --W: #f59e0b;
  --card-shadow: 0 8px 32px rgba(44,62,80,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(160deg, #fffef0 0%, #fff9c4 60%, #f0f9ff 100%);
  min-height: 100vh; color: var(--D); line-height: 1.5;
}
.wrap { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem; }
.card {
  background: rgba(255,255,255,0.95); border-radius: 24px; padding: 2.5rem;
  box-shadow: var(--card-shadow); border: 2px solid var(--Y); margin-bottom: 2rem;
}
h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; font-weight: 800; color: var(--D); letter-spacing: -2px; text-align: center; }
.field { margin-bottom: 1.5rem; }
.field label { display: block; margin-bottom: 0.5rem; font-weight: 700; font-size: 0.9rem; color: var(--G); text-transform: uppercase; }
.field input, .field select {
  width: 100%; padding: 1rem 1.25rem; border: 2px solid var(--B); border-radius: 14px;
  font-size: 1.05rem; font-family: inherit; transition: all 0.2s;
}
.btn {
  width: 100%; padding: 1.1rem; background: var(--Y); color: var(--D); border: none;
  border-radius: 14px; font-size: 1.1rem; font-weight: 800; cursor: pointer;
  font-family: 'Space Grotesk', sans-serif; transition: all 0.2s;
}
.btn:hover { background: var(--Yd); transform: translateY(-2px); }
.btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }
.multi-box {
  border: 2px solid var(--B); border-radius: 14px; padding: 0.75rem;
  max-height: 250px; overflow-y: auto; background: #fff;
}
.m-item {
  display: flex; align-items: center; padding: 0.85rem; gap: 1rem; cursor: pointer;
  border-radius: 10px; transition: background 0.2s;
}
.m-item:hover { background: #f8fafc; }
.m-item input { width: 20px; height: 20px; accent-color: var(--D); }
.hidden { display: none !important; }
/* Estilos de las opciones (formato producción) */
.opt {
  display: flex; align-items: center; gap: 1rem; padding: 1.25rem; border: 2px solid var(--B);
  border-radius: 16px; cursor: pointer; background: #fff; margin-bottom: 0.75rem;
  white-space: pre-wrap; font-weight: 500;
}
.opt.ok { border-color: var(--V); background: #f0fdf4; }
.opt.ko { border-color: var(--R); background: #fef2f2; }
.oltr {
  width: 32px; height: 32px; border-radius: 50%; background: var(--B);
  display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0;
}
</style>
</head>
<body>

<div class="wrap">
    <header style="margin-bottom: 2.5rem;">
        <h1>ENFOCADOS</h1>
        <p style="text-align:center; color:var(--G); font-weight:700;">PLATAFORMA DE PREPARACIÓN PROFESIONAL</p>
    </header>

    <div id="secLogin" class="card">
        <div class="field">
            <label>Introduce tu Email de alumno</label>
            <input type="email" id="inEmail" placeholder="ejemplo@correo.com">
        </div>
        <button id="btnLogin" class="btn" onclick="doLogin()">Entrar a la plataforma</button>
    </div>

    <div id="secConfig" class="card hidden">
        <h2 id="cfgUser" style="margin-bottom:1.5rem; font-family:'Space Grotesk'"></h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
            <div class="field"><label>Nº Preguntas</label><input type="number" id="inNum" value="10"></div>
            <div class="field">
                <label>Feedback</label>
                <select id="inFeedback"><option value="con">Inmediato</option><option value="sin">Al final</option></select>
            </div>
        </div>
        <div class="field">
            <label>Selecciona las Materias</label>
            <div id="multiMat" class="multi-box"></div>
        </div>
        <button id="btnStart" class="btn" onclick="startExam()" disabled>Selecciona una materia para empezar</button>
    </div>

    <div id="secQ" class="card hidden">
        <div id="qTxt" style="font-size:1.25rem; font-weight:700; margin-bottom:2rem; white-space:pre-wrap;"></div>
        <div id="optsWrap"></div>
        <div style="display:flex; gap:1rem; margin-top:2rem;">
            <button class="btn" style="background:var(--B)" onclick="prevQ()">Anterior</button>
            <button id="btnNext" class="btn" onclick="nextQ()">Siguiente</button>
        </div>
    </div>
</div>

<script>
// URL de tu API original
const apiUrl = 'https://script.google.com/macros/s/AKfycbx9MkwwgFndE2uMvhzHM4zDUzfbGmqwuzc10wKqapfy2nIiOQwjLCdwDsX_Hubru-8S/exec';

let allQuestions = [], exam = [], idx = 0, answers = [];

function fetchJSONP(url, callback) {
    const name = 'jsonp_' + Date.now();
    window[name] = (data) => { delete window[name]; callback(data); };
    const s = document.createElement('script');
    s.src = `${url}${url.includes('?') ? '&' : '?'}callback=${name}`;
    document.body.appendChild(s);
}

function doLogin() {
    const email = document.getElementById('inEmail').value.trim().toLowerCase();
    if(!email) return;
    
    document.getElementById('btnLogin').textContent = "Verificando acceso...";
    
    fetchJSONP(apiUrl + '?type=all', (res) => {
        // LÓGICA DE PRODUCCIÓN ORIGINAL: Acceso a la propiedad .rows
        const user = res.users.rows.find(u => u[1]?.toLowerCase().trim() === email);
        
        if(user) {
            // MAPEO PARA LA NUEVA BASE DE DATOS: q[8] es la columna I (Materia)
            allQuestions = res.questions.rows.slice(1).map(q => ({
                materia: String(q[8] || "Sin Materia").trim(),
                pregunta: q[1],
                opciones: q[2],
                respuesta: String(q[3] || "").trim().toLowerCase(),
                saber: q[4]
            })).filter(q => q.materia && q.pregunta);

            document.getElementById('cfgUser').textContent = "Bienvenido/a, " + user[0];
            renderMats();
            document.getElementById('secLogin').classList.add('hidden');
            document.getElementById('secConfig').classList.remove('hidden');
        } else {
            alert("Email no registrado.");
            document.getElementById('btnLogin').textContent = "Entrar a la plataforma";
        }
    });
}

function renderMats() {
    const container = document.getElementById('multiMat');
    const temas = [...new Set(allQuestions.map(q => q.materia))].sort();
    container.innerHTML = temas.map(t => `
        <label class="m-item">
            <input type="checkbox" name="mat" value="${t}" onchange="checkBtn()">
            <span style="font-weight:600">${t}</span>
        </label>
    `).join('');
}

function checkBtn() {
    const sel = document.querySelectorAll('input[name="mat"]:checked').length;
    document.getElementById('btnStart').disabled = (sel === 0);
}

function startExam() {
    const selected = Array.from(document.querySelectorAll('input[name="mat"]:checked')).map(c => c.value);
    const num = parseInt(document.getElementById('inNum').value);
    let pool = allQuestions.filter(q => selected.includes(q.materia));
    exam = pool.sort(() => 0.5 - Math.random()).slice(0, num);
    idx = 0; answers = new Array(exam.length).fill(null);
    showQ();
    document.getElementById('secConfig').classList.add('hidden');
    document.getElementById('secQ').classList.remove('hidden');
}

function showQ() {
    const q = exam[idx];
    const ans = answers[idx];
    document.getElementById('qTxt').textContent = `${idx + 1}. ${q.pregunta}`;
    
    const wrap = document.getElementById('optsWrap');
    wrap.innerHTML = "";

    // Separación por saltos de línea (A, B, C, D)
    const opts = q.opciones.split('\n').filter(o => o.trim());
    const letters = ['a','b','c','d','e'];

    opts.forEach((text, i) => {
        const L = letters[i];
        const div = document.createElement('div');
        div.className = 'opt';
        if(ans) {
            if(L === q.respuesta) div.classList.add('ok');
            if(ans === L && L !== q.respuesta) div.classList.add('ko');
        }
        div.innerHTML = `<div class="oltr">${L.toUpperCase()}</div><div style="flex:1">${text}</div>`;
        div.onclick = () => { if(!answers[idx]) { answers[idx] = L; showQ(); } };
        wrap.appendChild(div);
    });
    
    document.getElementById('btnNext').textContent = (idx === exam.length - 1) ? "Finalizar" : "Siguiente";
}

function nextQ() {
    if(idx < exam.length - 1) { idx++; showQ(); } 
    else { alert("Test finalizado"); location.reload(); }
}

function prevQ() { if(idx > 0) { idx--; showQ(); } }
</script>
</body>
</html>
