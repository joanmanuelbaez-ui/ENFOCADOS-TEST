<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENFOCADOS - Plataforma de Oposiciones</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* --- ESTILOS ORIGINALES MANTENIDOS --- */
*{margin:0;padding:0;box-sizing:border-box}
:root{--Y:rgb(250,250,0);--Yd:rgb(215,215,0);--D:#2c3e50;--D2:#1a252f;--V:#10b981;--R:#ef4444;--G:#64748b;--B:#e2e8f0;--W:#f59e0b}
body{font-family:'Inter',sans-serif;background:linear-gradient(160deg,#fffef0 0%,#fff9c4 100%);min-height:100vh;color:#1e293b;line-height:1.6}
.wrap{max-width:860px;margin:0 auto;padding:1.8rem 1.2rem}
header{text-align:center;margin-bottom:1.6rem}
h1{font-family:'Montserrat',sans-serif;font-size:2.8rem;font-weight:800;color:var(--D);letter-spacing:-1px}
.sub{color:var(--G);font-size:1rem;font-weight:500;text-transform:uppercase;letter-spacing:1px}
.card{background:#fff;border-radius:18px;padding:2rem;box-shadow:0 4px 24px rgba(0,0,0,.08);border:2px solid var(--Y);margin-bottom:1.4rem}
.field{margin-bottom:1.1rem;text-align:left}
.field label{display:block;margin-bottom:.3rem;color:var(--D);font-weight:600;font-size:.9rem}
.field input, .field select{width:100%;padding:.82rem 1rem;border:2px solid var(--B);border-radius:10px;font-size:1rem}
.btn{padding:.88rem 1.5rem;background:var(--Y);color:var(--D);border:none;border-radius:10px;font-size:1.05rem;font-weight:700;cursor:pointer;width:100%}
.btn:disabled{background:#cbd5e1;color:#94a3b8;cursor:not-allowed}
.ubar{background:linear-gradient(135deg,var(--Y),rgb(255,255,100));padding:.78rem 1.1rem;border-radius:10px;display:flex;justify-content:space-between;margin-bottom:1.4rem;font-weight:600}
.multi-box{border:2px solid var(--B);border-radius:10px;padding:10px;max-height:200px;overflow-y:auto;background:#f8fafc}
.m-item{display:flex;align-items:center;padding:8px;gap:10px;border-bottom:1px solid #edf2f7}
.pbar-bg{background:var(--B);border-radius:4px;height:6px;margin-bottom:1.2rem;overflow:hidden}
.pbar{background:var(--Y);height:100%;transition:width .4s ease}
.opt{display:flex;align-items:center;gap:.85rem;padding:1rem;border:2px solid var(--B);border-radius:11px;cursor:pointer;background:#fff;margin-bottom:10px}
.opt.ok{border-color:var(--V);background:#f0fdf4}
.opt.ko{border-color:var(--R);background:#fef2f2}
.oltr{width:30px;height:30px;border-radius:50%;background:var(--B);display:flex;align-items:center;justify-content:center;font-weight:700}
.fb{margin-top:1.3rem;padding:1.2rem;border-radius:10px;border-left:4px solid var(--V)}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="wrap">
    <header>
        <h1>ENFOCADOS</h1>
        <div class="sub">Plataforma de Oposiciones</div>
    </header>

    <div id="secLogin" class="card">
        <h2 style="text-align:center;margin-bottom:1.5rem">Acceso de Test</h2>
        <div class="field"><label>Email</label><input type="email" id="inEmail" placeholder="tu@email.com"></div>
        <button id="btnLogin" class="btn" onclick="doLogin()">Entrar</button>
    </div>

    <div id="secConfig" class="card hidden">
        <div class="ubar"><span id="cfgUser"></span><span style="font-size:0.8rem;cursor:pointer" onclick="location.reload()">SALIR</span></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
            <div class="field"><label>Nº Preguntas</label><input type="number" id="inNum" value="10"></div>
            <div class="field"><label>Feedback</label><select id="inFeedback"><option value="con">Con explicación</option><option value="sin">Sin</option></select></div>
        </div>
        <div class="field">
            <label>Materias</label>
            <div id="multiMat" class="multi-box">Cargando materias...</div>
        </div>
        <button id="btnStart" class="btn" onclick="startExam()">COMENZAR EXAMEN</button>
    </div>

    <div id="secQ" class="card hidden">
        <div id="qNum" style="font-weight:800"></div>
        <div class="pbar-bg"><div id="pBar" class="pbar"></div></div>
        <div id="qTxt" style="font-size:1.1rem;margin-bottom:1.5rem;white-space:pre-wrap"></div>
        <div id="optsWrap"></div>
        <div id="fbWrap"></div>
        <div style="display:flex; gap:10px; margin-top:1.5rem">
            <button class="btn" style="background:#fff;border:2px solid var(--Y)" onclick="prevQ()">Anterior</button>
            <button class="btn" onclick="nextQ()">Siguiente / Terminar</button>
        </div>
    </div>

    <div id="secRes" class="card hidden" style="text-align:center">
        <h2>Resultado</h2>
        <div id="rPct" style="font-size:4rem;font-weight:800;margin:1rem 0"></div>
        <button class="btn" onclick="location.reload()">Nueva Evaluación</button>
    </div>
</div>

<script>
const apiUrl = 'https://script.google.com/macros/s/AKfycbx9MkwwgFndE2uMvhzHM4zDUzfbGmqwuzc10wKqapfy2nIiOQwjLCdwDsX_Hubru-8S/exec';
let allQuestions = [], exam = [], idx = 0, userAnswers = [];

// Función para conectar con Google Sheets
function fetchJSONP(url, callback) {
    const name = 'jsonp_' + Date.now();
    window[name] = (data) => { delete window[name]; callback(data); };
    const s = document.createElement('script');
    s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + name;
    document.body.appendChild(s);
}

function doLogin() {
    const email = document.getElementById('inEmail').value.trim().toLowerCase();
    if(!email) return alert("Escribe tu email");
    
    document.getElementById('btnLogin').textContent = "Cargando...";

    // Pedimos datos de usuarios y preguntas a la vez
    fetchJSONP(apiUrl + '?type=users', (uRes) => {
        const users = uRes.rows;
        // Buscamos el email en la segunda columna (índice 1)
        const userRow = users.find(row => row[1] && row[1].toLowerCase().trim() === email);
        
        if(userRow) {
            fetchJSONP(apiUrl + '?type=questions', (qRes) => {
                // Mapeamos las preguntas (ajustado a tu nueva estructura de columnas)
                allQuestions = qRes.rows.slice(1).map(r => ({
                    pregunta: r[1],
                    opciones: r[2],
                    respuesta: String(r[3] || "").trim().toUpperCase(),
                    saber: r[4] || "",
                    materia: r[8] || "General"
                })).filter(q => q.pregunta);

                document.getElementById('cfgUser').textContent = "Hola, " + userRow[0];
                setupMats();
                showScreen('secConfig');
            });
        } else {
            alert("Acceso denegado: Email no encontrado.");
            document.getElementById('btnLogin').textContent = "Entrar";
        }
    });
}

function setupMats() {
    const mats = [...new Set(allQuestions.map(q => q.materia))].sort();
    const container = document.getElementById('multiMat');
    container.innerHTML = mats.map(m => `
        <label class="m-item">
            <input type="checkbox" name="materia" value="${m}" checked> <span>${m}</span>
        </label>
    `).join('');
}

function startExam() {
    const sel = Array.from(document.querySelectorAll('input[name="materia"]:checked')).map(cb => cb.value);
    if(sel.length === 0) return alert("Selecciona al menos una materia");
    
    const num = parseInt(document.getElementById('inNum').value) || 10;
    exam = allQuestions.filter(q => sel.includes(q.materia))
            .sort(() => 0.5 - Math.random()).slice(0, num);
    
    idx = 0; userAnswers = new Array(exam.length).fill(null);
    showQ();
    showScreen('secQ');
}

function showQ() {
    const q = exam[idx];
    document.getElementById('qNum').textContent = "Pregunta " + (idx + 1) + "/" + exam.length;
    document.getElementById('pBar').style.width = ((idx + 1) / exam.length * 100) + "%";
    document.getElementById('qTxt').textContent = q.pregunta;

    const wrap = document.getElementById('optsWrap');
    wrap.innerHTML = "";
    document.getElementById('fbWrap').innerHTML = "";
    
    const opts = q.opciones.split('\n').filter(o => o.trim());
    const letters = ['A', 'B', 'C', 'D'];

    opts.forEach((txt, i) => {
        const L = letters[i];
        const div = document.createElement('div');
        div.className = 'opt';
        if(userAnswers[idx] === L) {
            div.classList.add(L === q.respuesta ? 'ok' : 'ko');
        } else if(userAnswers[idx] !== null && L === q.respuesta) {
            div.classList.add('ok');
        }
        
        div.innerHTML = `<div class="oltr">${L}</div><div style="flex:1">${txt}</div>`;
        div.onclick = () => { if(userAnswers[idx] === null) { userAnswers[idx] = L; showQ(); } };
        wrap.appendChild(div);
    });

    if(userAnswers[idx] !== null && document.getElementById('inFeedback').value === 'con') {
        document.getElementById('fbWrap').innerHTML = `
            <div class="fb">
                <b>Respuesta: ${q.respuesta}</b><br>${q.saber}
            </div>`;
    }
}

function nextQ() { 
    if(idx < exam.length - 1) { idx++; showQ(); } 
    else { finishExam(); }
}
function prevQ() { if(idx > 0) { idx--; showQ(); } }

function finishExam() {
    const oks = userAnswers.filter((a, i) => a === exam[i].respuesta).length;
    document.getElementById('rPct').textContent = Math.round(oks/exam.length*100) + "%";
    showScreen('secRes');
}

function showScreen(id) {
    document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}
</script>
</body>
</html>
